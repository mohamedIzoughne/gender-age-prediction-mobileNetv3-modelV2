prefix: "mobilenet_v3_large_no_aug"

use_dynamic_augmentation: False

model_type: "mobilenet_v3_large"

ds_path: "/content/data/UTKFace/UTKFace"

num_epochs: 24
batch_size: 256
freeze_epochs: 0
gender_loss_weight: 0.8

# Optimizer params
base_lr: 0.0002
weight_decay: 0.00035

# Regularization params
dropout: 0.30
l1_lambda: 0.0001

# Scheduler specific params
lr_scheduler: "one_cycle"
max_lr: 0.0048
anneal_strategy: "cos"
pct_start: 0.22
div_factor: 25
final_div_factor: 10000

override_cycle_epoch_count: 24

# Transform params
include_center_crop: True
include_color_jitter: true
include_gaussian_blur: false
include_gaussian_noise: false
include_random_affine: true
include_random_erasing: true
include_random_grayscale: true
include_random_horizontal_flip: false
include_random_perspective: true
include_random_rotation: true
