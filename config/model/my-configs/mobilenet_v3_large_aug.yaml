prefix: "mobilenet_v3_large_aug"

use_dynamic_augmentation: True
dynamic_augmentation_mult: 0.3
num_aug_bins: 9

model_type: "mobilenet_v3_large"

# val_path: "dataset/test_2_folds_last"
# train_path: "dataset/train_8_folds_first"
ds_path: "/content/data/UTKFace/UTKFace"

num_epochs: 18
batch_size: 256
freeze_epochs: 0
gender_loss_weight: 0.8


# Optimizer params
base_lr: 0.0068893981577029285
weight_decay: 0.00019323262043373016

# Regularization params
dropout: 0.1
l1_lambda: 0.0001

# Scheduler specific params
lr_scheduler: "one_cycle"
max_lr: 0.012321315111072404 # 0.012321315111072404
anneal_strategy: "cos"
pct_start: 0.36685557351085574
div_factor: 24
final_div_factor: 2873

override_cycle_epoch_count: 17

# Transform params
include_center_crop: False
include_color_jitter: true
include_gaussian_blur: false
include_gaussian_noise: false
include_random_affine: true
include_random_erasing: true
include_random_grayscale: true
include_random_horizontal_flip: false
include_random_perspective: true
include_random_rotation: true
